name: CDC Pipeline - Consumer Driven Contract Testing

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/**/*.ts --max-warnings 0 || true

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit
        run: npm audit --audit-level=high

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run producer unit tests with coverage
        run: npx jest src/producer/app.test.ts --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  consumer-contracts:
    name: Generate Consumer Contracts
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run consumer Pact tests (generate contracts)
        run: npx jest src/consumer/notification.consumer.pact.test.ts --testTimeout=30000

      - name: Upload generated pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

  provider-verification:
    name: Provider Contract Verification
    runs-on: ubuntu-latest
    needs: [consumer-contracts]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Verify provider against consumer contracts
        run: npx jest src/producer/provider.pact.test.ts --testTimeout=30000

      - name: Upload verification results
        uses: actions/upload-artifact@v4
        with:
          name: verification-results
          path: pacts/
