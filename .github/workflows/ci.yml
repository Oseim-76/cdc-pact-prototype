name: CDC Pact Prototype CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint src/**/*.ts --max-warnings=0
      - run: npx tsc --noEmit

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run producer unit tests with coverage
        run: npx jest src/producer/app.test.ts --coverage --coverageThreshold='{"global":{"statements":80,"branches":80,"functions":80,"lines":80}}'
      - name: Run consumer unit tests
        run: npx jest src/consumer/app.test.ts --no-coverage

  consumer-contracts:
    name: Generate Consumer Contracts
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run consumer Pact tests
        run: npx jest src/consumer/notification.consumer.pact.test.ts --testTimeout=30000
      - name: Upload pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

  provider-verification:
    name: Provider Contract Verification
    runs-on: ubuntu-latest
    needs: [consumer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
      - name: Verify provider against contracts
        run: npx jest src/producer/provider.pact.test.ts --testTimeout=30000

  backward-compatibility:
    name: V2 Backward Compatibility
    runs-on: ubuntu-latest
    needs: [consumer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
      - name: Verify v2 producer backward compatibility
        run: npx jest src/producer/provider.v2.pact.test.ts --testTimeout=30000

  can-i-deploy:
    name: Can I Deploy — Pact Broker Matrix Check
    runs-on: ubuntu-latest
    needs: [provider-verification, backward-compatibility]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Start Pact Broker
        run: |
          docker run -d \
            --name pact-broker \
            -p 9292:9292 \
            -e PACT_BROKER_DATABASE_ADAPTER=sqlite \
            -e PACT_BROKER_DATABASE_NAME=/tmp/pact_broker.sqlite \
            -e PACT_BROKER_ALLOW_PUBLIC_READ=true \
            pactfoundation/pact-broker:latest
          sleep 20

      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Install Pact standalone CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          echo "$HOME/.pact/bin" >> $GITHUB_PATH

      - name: Publish contracts to broker
        run: |
          pact-broker publish pacts/ \
            --broker-base-url http://localhost:9292 \
            --consumer-app-version 1.0.0 \
            --tag main

      - name: Record provider verification
        run: |
          pact-broker record-deployment \
            --broker-base-url http://localhost:9292 \
            --pacticipant NotificationProducer \
            --version 1.0.0 \
            --environment production || true

      - name: Can I Deploy — consumer check
        run: |
          pact-broker can-i-deploy \
            --broker-base-url http://localhost:9292 \
            --pacticipant NotificationConsumer \
            --version 1.0.0 \
            --to-environment production \
            --retry-while-unknown 3 \
            --retry-interval 5
