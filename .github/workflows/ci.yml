name: CDC Pact Prototype CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint src/**/*.ts --max-warnings=0
      - run: npx tsc --noEmit

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run producer unit tests with coverage
        run: npx jest src/producer/app.test.ts --coverage --coverageThreshold='{"global":{"statements":80,"branches":80,"functions":80,"lines":80}}'
      - name: Run consumer unit tests
        run: npx jest src/consumer/app.test.ts --no-coverage

  consumer-contracts:
    name: Generate Consumer Contracts
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run consumer Pact tests
        run: npx jest src/consumer/notification.consumer.pact.test.ts --testTimeout=30000
      - name: Upload pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

  provider-verification:
    name: Provider Contract Verification
    runs-on: ubuntu-latest
    needs: [consumer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
      - name: Verify provider against contracts
        run: npx jest src/producer/provider.pact.test.ts --testTimeout=30000

  backward-compatibility:
    name: V2 Backward Compatibility
    runs-on: ubuntu-latest
    needs: [consumer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
      - name: Verify v2 producer backward compatibility
        run: npx jest src/producer/provider.v2.pact.test.ts --testTimeout=30000

  can-i-deploy:
    name: Can I Deploy — Pact Broker Matrix Check
    runs-on: ubuntu-latest
    needs: [provider-verification, backward-compatibility]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Validate contract exists and is well-formed
        run: |
          echo "=== Pact Contract Matrix Validation ==="
          CONTRACT="pacts/NotificationConsumer-NotificationProducer.json"

          if [ ! -f "$CONTRACT" ]; then
            echo "ERROR: Contract file not found"
            exit 1
          fi

          CONSUMER=$(node -e "const p=require('./$CONTRACT'); console.log(p.consumer.name)")
          PROVIDER=$(node -e "const p=require('./$CONTRACT'); console.log(p.provider.name)")
          INTERACTIONS=$(node -e "const p=require('./$CONTRACT'); console.log(p.interactions.length)")
          VERSION=$(node -e "const p=require('./$CONTRACT'); console.log(p.metadata?.pactSpecification?.version || p.metadata?.['pact-specification']?.version || '3.0.0')")

          echo "Consumer:     $CONSUMER"
          echo "Provider:     $PROVIDER"
          echo "Interactions: $INTERACTIONS"
          echo "Pact version: $VERSION"

          if [ "$CONSUMER" != "NotificationConsumer" ]; then
            echo "ERROR: Unexpected consumer name"
            exit 1
          fi
          if [ "$PROVIDER" != "NotificationProducer" ]; then
            echo "ERROR: Unexpected provider name"
            exit 1
          fi
          if [ "$INTERACTIONS" -lt 4 ]; then
            echo "ERROR: Expected at least 4 interactions, found $INTERACTIONS"
            exit 1
          fi

          echo ""
          echo "=== Interactions verified ==="
          node -e "
            const p = require('./$CONTRACT');
            p.interactions.forEach((i, idx) => {
              console.log((idx+1) + '. ' + i.description + ' -> ' + i.response.status);
            });
          "
          echo ""
          echo "=== Can I Deploy: YES ==="
          echo "Provider verification passed in stage 5."
          echo "All $INTERACTIONS consumer interactions verified against NotificationProducer."
          echo "Deployment gate: APPROVED"
