name: CDC Pipeline - Consumer Driven Contract Testing

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint src/**/*.ts --max-warnings 0 || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run producer unit tests
        run: npx jest src/producer/app.test.ts --coverage --coverageReporters=text
      - name: Run alternatives comparison tests
        run: npx jest src/producer/provider.only.test.ts --verbose

  consumer-contracts:
    name: Generate Consumer Contracts
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run consumer Pact tests
        run: npx jest src/consumer/notification.consumer.pact.test.ts --testTimeout=30000
      - name: Upload pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

  provider-verification:
    name: Provider Contract Verification
    runs-on: ubuntu-latest
    needs: [consumer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
      - name: Verify provider against contracts
        run: npx jest src/producer/provider.pact.test.ts --testTimeout=30000

  backward-compatibility:
    name: V2 Backward Compatibility
    runs-on: ubuntu-latest
    needs: [consumer-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
      - name: Verify v2 producer backward compatibility
        run: npx jest src/producer/provider.v2.pact.test.ts --testTimeout=30000
